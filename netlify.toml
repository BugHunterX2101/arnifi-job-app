[build]
  publish = "client/dist"
  command = "npm install --prefix netlify/functions && npm install --prefix client && npm run build --prefix client"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pg", "pg-hstore", "sequelize", "bcryptjs"]
