[build]
  publish = "client/dist"
  command = "cd netlify/functions && npm install && cd ../../client && npm install && npm run build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Route all /api/* calls to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pg", "pg-hstore", "sequelize", "bcryptjs"]

